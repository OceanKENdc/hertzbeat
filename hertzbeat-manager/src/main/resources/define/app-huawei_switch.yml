# The monitoring type category：service-application service monitoring db-database monitoring custom-custom monitoring os-operating system monitoring
category: network
# The monitoring type eg: linux windows tomcat mysql aws...
app: huawei_switch
# The monitoring i18n name
name:
  zh-CN: 华为通用交换机
  en-US: Huawei Switch
  ja-JP: Huaweiスイッチングハブ
# The description and help of this monitoring type
help:
  zh-CN: Hertzbeat 使用 <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-snmp'> SNMP 协议</a> 对 华为交换机 的通用指标(可用性，系统信息，端口流量等)进行采集监控。<br>您可以点击 “<i>新建 华为通用交换机</i>” 并进行配置SNMP相关参数添加，或者选择“<i>更多操作</i>”，导入已有配置。
  en-US: HertzBeat uses <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-snmp'> SNMP Protocol</a> to monitoring Huawei Switch general performance metrics. <br>You can click the "<i>New Huawei Switch</i>" button and config snmp params to add monitor or import an existing setup through the "<i>More Actions</i>" menu.
  zh-TW: Hertzbeat 使用 <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-snmp'> SNMP 協議</a> 對 华为交換機 的通用指標(可用性，系統信息，端口流量等)進行采集監控。<br>您可以點擊 “<i>新建 华为通用交換機</i>” 並進行配置SNMP相關參數添加，或者選擇“<i>更多操作</i>”，導入已有配置。
  ja-JP: Hertzbeat は <a class='help_module_content' href='https://hertzbeat.apache.org/docs/advanced/extend-snmp'> SNMP プロトコルを介して</a> Huaweiスイッチングハブの一般的なメトリクスを監視します。<br>「<i>新規 Huaweiスイッチングハブ</i>」をクリックしてSNMPなどのパラメタを設定した後、新規することができます。
helpLink:
  zh-CN: https://hertzbeat.apache.org/zh-cn/docs/help/huawei_switch
  en-US: https://hertzbeat.apache.org/docs/help/huawei_switch
# Input params define for monitoring(render web ui by the definition)
params:
  # field-param field key
  - field: host
    # name-param field display i18n name
    name:
      zh-CN: 目标Host
      en-US: Target Host
      ja-JP: 目標ホスト
    # type-param field type(most mapping the html input type)
    type: host
    # required-true or false
    required: true
  # field-param field key
  - field: port
    # name-param field display i18n name
    name:
      zh-CN: 端口
      en-US: Port
      ja-JP: ポート
    # type-param field type(most mapping the html input type)
    type: number
    # when type is number, range is required
    range: '[0,65535]'
    # required-true or false
    required: true
    # default value
    defaultValue: 161
  # field-param field key
  - field: snmpVersion
    # name-param field display i18n name
    name:
      zh-CN: SNMP 版本
      en-US: SNMP Version
      ja-JP: SNMPバージョン
    # type-param field type(radio mapping the html radio tag)
    type: radio
    # required-true or false
    required: true
    # when type is radio checkbox, use option to show optional values {name1:value1,name2:value2}
    options:
      - label: SNMPv1
        value: 0
      - label: SNMPv2c
        value: 1
      - label: SNMPv3
        value: 3
  # field-param field key
  - field: community
    # name-param field display i18n name
    name:
      zh-CN: SNMP 团体字
      en-US: SNMP Community
      ja-JP: SNMPコミュニティ
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 100
    # required-true or false
    required: false
    # param field input placeholder
    placeholder: 'Snmp community for v1 v2c'
    # dependent parameter values list
    depend:
      snmpVersion:
        - 0
        - 1
  # field-param field key
  - field: username
    # name-param field display i18n name
    name:
      zh-CN: SNMP username
      en-US: SNMP username
      ja-JP: SNMPユーザー名
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 50
    # required-true or false
    required: false
    # param field input placeholder
    placeholder: 'Snmp username for v3'
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
      # field-param field key
  - field: contextName
    # name-param field display i18n name
    name:
      zh-CN: SNMP contextName
      en-US: SNMP contextName
      ja-JP: SNMPコンテキスト名
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 100
    # required-true or false
    required: false
    # param field input placeholder
    placeholder: 'Snmp contextName for v3'
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
    # field-param field key
  - field: authPassphrase
    # name-param field display i18n name
    name:
      zh-CN: SNMP authPassword
      en-US: SNMP authPassword
      ja-JP: SNMP認証パスワード
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 100
    # required-true or false
    required: false
    # param field input placeholder
    placeholder: 'Snmp authPassword for v3'
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
    # field-param field key
  - field: authPasswordEncryption
    # name-param field display i18n name
    name:
      zh-CN: authPassword 加密方式
      en-US: authPassword Encryption
      ja-JP: 認証暗号
    # type-param field type(radio mapping the html radio tag)
    type: radio
    # required-true or false
    required: false
    # when type is radio checkbox, use option to show optional values {name1:value1,name2:value2}
    options:
      - label: MD5
        value: 0
      - label: SHA1
        value: 1
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
    # field-param field key
  - field: privPassphrase
    # name-param field display i18n name
    name:
      zh-CN: SNMP privPassphrase
      en-US: SNMP privPassphrase
      ja-JP: SNMPパスワードフレーズ
    # type-param field type(most mapping the html input type)
    type: text
    # when type is text, use limit to limit string length
    limit: 100
    # required-true or false
    required: false
    # param field input placeholder
    placeholder: 'Snmp privPassphrase for v3'
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
    # field-param field key
  - field: privPasswordEncryption
    # name-param field display i18n name
    name:
      zh-CN: privPassword 加密方式
      en-US: privPassword Encryption
      ja-JP: パスワードの暗号
    # type-param field type(radio mapping the html radio tag)
    type: radio
    # required-true or false
    required: false
    # when type is radio checkbox, use option to show optional values {name1:value1,name2:value2}
    options:
      - label: DES
        value: 0
      - label: AES128
        value: 1
    # dependent parameter values list
    depend:
      snmpVersion:
        - 3
    # field-param field key
  - field: timeout
    # name-param field display i18n name
    name:
      zh-CN: 超时时间(ms)
      en-US: Timeout(ms)
      ja-JP: タイムアウト（ｍｓ）
    # type-param field type(most mapping the html input type)
    type: number
    # when type is number, range is required
    range: '[0,100000]'
    # required-true or false
    required: false
    # hide-is hide this field and put it in advanced layout
    hide: true
    # default value
    defaultValue: 6000
# collect metrics config list
metrics:
  # metrics - system
  - name: system
    i18n:
      zh-CN: 系统信息
      en-US: System Info
      ja-JP: システム情報
    # metrics scheduling priority(0->127)->(high->low), metrics with the same priority will be scheduled in parallel
    # priority 0's metrics is availability metrics, it will be scheduled first, only availability metrics collect success will the scheduling continue
    priority: 0
    # collect metrics content
    fields:
      # field-metric name, type-metric type(0-number,1-string), unit-metric unit('%','ms','MB'), label-whether it is a metrics label field
      - field: name
        type: 1
        i18n:
          zh-CN: 主机名称
          en-US: Host Name
          ja-JP: ホスト名
      - field: descr
        type: 1
        i18n:
          zh-CN: 描述信息
          en-US: Description
          ja-JP: 説明
      - field: uptime
        type: 1
        i18n:
          zh-CN: 运行时长
          en-US: Uptime
          ja-JP: アップタイム
      - field: location
        type: 1
        i18n:
          zh-CN: 位置
          en-US: Location
          ja-JP: 位置
      - field: contact
        type: 1
        i18n:
          zh-CN: 联系人
          en-US: Contact
          ja-JP: 連絡先
      - field: responseTime
        type: 0
        unit: ms
        i18n:
          zh-CN: 响应时间
          en-US: Response Time
          ja-JP: 応答時間
    # the protocol used for monitoring, eg: sql, ssh, http, telnet, wmi, snmp, sdk
    protocol: snmp
    # the config content when protocol is snmp
    snmp:
      # server host: ipv4 ipv6 domain
      host: ^_^host^_^
      # server port
      port: ^_^port^_^
      # snmp username
      username: ^_^username^_^
      # snmp authPassphrase
      authPassphrase: ^_^authPassphrase^_^
      # snmp privPassphrase
      privPassphrase: ^_^privPassphrase^_^
      # snmp privPasswordEncryption
      privPasswordEncryption: ^_^privPasswordEncryption^_^
      # snmp authPasswordEncryption
      authPasswordEncryption: ^_^authPasswordEncryption^_^
      # contextName
      contextName: ^_^contextName^_^
      # snmp connect timeout
      timeout: ^_^timeout^_^
      # snmp community
      community: ^_^community^_^
      # snmp version
      version: ^_^snmpVersion^_^
      # snmp operation: get, walk
      operation: get
      # metrics oids: metric_name - oid_value
      oids:
        name: 1.3.6.1.2.1.1.5.0
        descr: 1.3.6.1.2.1.1.1.0
        uptime: 1.3.6.1.2.1.1.3.0
        location: 1.3.6.1.2.1.1.6.0
        contact: 1.3.6.1.2.1.1.4.0

  - name: interfaces
    i18n:
      zh-CN: 接口详情
      en-US: Interfaces Detail
      ja-JP: ネットワークカード詳細
    priority: 1
    fields:
      - field: index
        type: 1
        i18n:
          zh-CN: 编号
          en-US: Index
          ja-JP: 番号
      - field: descr
        type: 1
        i18n:
          zh-CN: 接口描述
          en-US: Interface Description
          ja-JP: インターフェース説明
      - field: if_name
        type: 1
        label: true
        i18n:
          zh-CN: 接口名称
          en-US: Interface Name
          ja-JP: インターフェース名
      - field: if_alias
        type: 1
        i18n:
          zh-CN: 端口别名
          en-US: Port Alias
          ja-JP: ポートエイリアス
      - field: mtu
        type: 0
        unit: 'byte'
        i18n:
          zh-CN: MTU
          en-US: MTU
          ja-JP: MTU
      - field: speed
        type: 0
        unit: 'Mbps'
        i18n:
          zh-CN: 接口速率
          en-US: Interface Speed
          ja-JP: インターフェース速度
      - field: in_octets
        type: 0
        unit: 'Byte'
        i18n:
          zh-CN: 入流量
          en-US: In Octets
          ja-JP: 受信バイト数
      - field: in_ucast_pkts
        type: 0
        i18n:
          zh-CN: 入单播包数
          en-US: In Unicast Packets
          ja-JP: 受信ユニキャストパケット数
      - field: in_discards
        type: 0
        i18n:
          zh-CN: 入丢包数
          en-US: In Discards
          ja-JP: 受信破棄パケット数
      - field: in_errors
        type: 0
        i18n:
          zh-CN: 入错包数
          en-US: In Errors
          ja-JP: 受信エラーパケット数
      - field: out_octets
        type: 0
        unit: 'Byte'
        i18n:
          zh-CN: 出流量
          en-US: Out Octets
          ja-JP: 送信バイト数
      - field: out_ucast_pkts
        type: 0
        i18n:
          zh-CN: 出单播包数
          en-US: Out Unicast Packets
          ja-JP: 送信ユニキャストパケット数
      - field: out_discards
        type: 0
        i18n:
          zh-CN: 出丢包数
          en-US: Out Discards
          ja-JP: 送信破棄パケット数
      - field: out_errors
        type: 0
        i18n:
          zh-CN: 出错包数
          en-US: Out Errors
          ja-JP: 送信エラーパケット数
      - field: admin_status
        type: 1
        i18n:
          zh-CN: 配置状态
          en-US: Config Status
          ja-JP: 設定ステータス
      - field: oper_status
        type: 1
        i18n:
          zh-CN: 当前状态
          en-US: Current Status
          ja-JP: 現在のステータス
#      - field: flow_status
#        type: 1
#        i18n:
#          zh-CN: 流量状态
#          en-US: Flow Status
#          ja-JP: フローステータス
    # (optional)metrics field alias name, it is used as an alias field to map and convert the collected data and metrics field
    aliasFields:
      - ifIndex
      - ifDescr
      - ifName
      - ifAlias
      - ifMtu
      - ifHighSpeed
      - ifHCInOctets
      - ifInUcastPkts
      - ifInDiscards
      - ifInErrors
      - ifHCOutOctets
      - ifOutUcastPkts
      - ifOutDiscards
      - ifOutErrors
      - ifAdminStatus
      - ifOperStatus
#      - hwIFExtInputOctetRate
#      - hwIFExtInputHighOctetRate
#      - hwIFExtOutputOctetRate
#      - hwIFExtOutputHighOctetRate
#      - hwIFExtFlowStatus
    # mapping and conversion expressions, use these and aliasField above to calculate metrics value
    # eg: cores=core1+core2, usage=usage, waitTime=allTime-runningTime
    calculates:
      - index=ifIndex
      - descr=ifDescr
      - if_name=ifName
      - if_alias=ifAlias
      - mtu=ifMtu
      - speed=ifHighSpeed
      - in_octets=ifHCInOctets
      - in_ucast_pkts=ifInUcastPkts
      - in_discards=ifInDiscards
      - in_errors=ifInErrors
      - out_octets=ifHCOutOctets
      - out_ucast_pkts=ifOutUcastPkts
      - out_discards=ifOutDiscards
      - out_errors=ifOutErrors
      - admin_status=ifAdminStatus
      - oper_status=ifOperStatus
#      - in_octet_rate=(hwIFExtInputHighOctetRate * 4294967296 + hwIFExtInputOctetRate) * 8 / 1000000
#      - out_octet_rate=(hwIFExtOutputHighOctetRate * 4294967296 + hwIFExtOutputOctetRate) * 8 / 1000000
#      - flow_status=hwIFExtFlowStatus
    # 使用 rates 机制从标准计数器自动计算接口速率，替代厂商私有 OID
    rates:
      - field: in_octet_rate
        counter: ifHCInOctets
        unit: bps
      - field: out_octet_rate
        counter: ifHCOutOctets
        unit: bps
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      authPassphrase: ^_^authPassphrase^_^
      privPassphrase: ^_^privPassphrase^_^
      privPasswordEncryption: ^_^privPasswordEncryption^_^
      authPasswordEncryption: ^_^authPasswordEncryption^_^
      contextName: ^_^contextName^_^
      timeout: ^_^timeout^_^
      community: ^_^community^_^
      version: ^_^snmpVersion^_^
      operation: walk
      oids:
        ifIndex: 1.3.6.1.2.1.2.2.1.1
        ifDescr: 1.3.6.1.2.1.2.2.1.2
        ifName: 1.3.6.1.2.1.31.1.1.1.1
        ifAlias: 1.3.6.1.2.1.31.1.1.1.18
        ifMtu: 1.3.6.1.2.1.2.2.1.4
        ifHighSpeed: 1.3.6.1.2.1.31.1.1.1.15
        ifHCInOctets: 1.3.6.1.2.1.31.1.1.1.6
        ifInUcastPkts: 1.3.6.1.2.1.2.2.1.11
        ifInDiscards: 1.3.6.1.2.1.2.2.1.13
        ifInErrors: 1.3.6.1.2.1.2.2.1.14
        ifHCOutOctets: 1.3.6.1.2.1.31.1.1.1.10
        ifOutUcastPkts: 1.3.6.1.2.1.2.2.1.17
        ifOutDiscards: 1.3.6.1.2.1.2.2.1.19
        ifOutErrors: 1.3.6.1.2.1.2.2.1.20
        ifAdminStatus: 1.3.6.1.2.1.2.2.1.7
        ifOperStatus: 1.3.6.1.2.1.2.2.1.8
#        hwIFExtInputOctetRate: 1.3.6.1.4.1.2011.5.25.41.1.1.1.1.19
#        hwIFExtInputHighOctetRate: 1.3.6.1.4.1.2011.5.25.41.1.1.1.1.20
#        hwIFExtOutputOctetRate: 1.3.6.1.4.1.2011.5.25.41.1.1.1.1.21
#        hwIFExtOutputHighOctetRate: 1.3.6.1.4.1.2011.5.25.41.1.1.1.1.22
#        hwIFExtFlowStatus: 1.3.6.1.4.1.2011.5.25.41.1.1.1.1.8
  - name: entity
    i18n:
      zh-CN: 设备硬件状态
      en-US: Device Hardware Status
    priority: 2
    fields:
      - field: entity_name
        type: 1
        label: true
        i18n:
          zh-CN: 实体名称
          en-US: Entity Name
          ja-JP: エンティティ名
      - field: cpu_usage
        type: 0
        unit: '%'
        i18n:
          zh-CN: CPU使用率
          en-US: CPU Usage
          ja-JP: CPU使用率
      - field: mem_usage
        type: 0
        unit: '%'
        i18n:
          zh-CN: 内存使用率
          en-US: Memory Usage
          ja-JP: メモリ使用率
      - field: temperature
        type: 0
        unit: '℃'
        i18n:
          zh-CN: 温度
          en-US: Temperature
          ja-JP: 温度
    aliasFields:
      - entPhysicalName
      - hwEntityCpuUsage
      - hwEntityMemUsage
      - hwEntityTemperature
    calculates:
      - entity_name=entPhysicalName
      - cpu_usage=hwEntityCpuUsage
      - mem_usage=hwEntityMemUsage
      - temperature=hwEntityTemperature
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      username: ^_^username^_^
      authPassphrase: ^_^authPassphrase^_^
      privPassphrase: ^_^privPassphrase^_^
      privPasswordEncryption: ^_^privPasswordEncryption^_^
      authPasswordEncryption: ^_^authPasswordEncryption^_^
      contextName: ^_^contextName^_^
      timeout: ^_^timeout^_^
      community: ^_^community^_^
      version: ^_^snmpVersion^_^
      operation: walk
      oids:
        entPhysicalName: 1.3.6.1.2.1.47.1.1.1.1.7
        hwEntityCpuUsage: 1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5
        hwEntityMemUsage: 1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7
        hwEntityTemperature: 1.3.6.1.4.1.2011.5.25.31.1.1.1.1.11
